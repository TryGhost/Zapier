name: Test
on:
  pull_request:
  push:
    branches:
      - main
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [ '22', '24' ]
    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: E2E (real Ghost)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: TryGhost/Ghost
          ref: main
          path: Ghost
          # the default theme lives in a submodule and Ghost needs it to boot
          submodules: true
          persist-credentials: false
      # Node version follows Ghost's engines (^22.18.0); the Zapier app
      # itself is tested on its full matrix in the build job
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.18.0'
      # corepack picks the pinned pnpm per directory: this app's
      # packageManager field at the root, Ghost's own inside Ghost/
      - name: Install Corepack
        run: npm install --global corepack@0.34.6
      - name: Enable corepack
        run: corepack enable
      - name: Get pnpm store directory
        id: pnpm-store
        # each pnpm major keeps its store in a versioned subdirectory
        # (e.g. v10 for this app, v11 for Ghost), so cache the common parent
        run: echo "path=$(dirname "$(pnpm store path --silent)")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml', 'Ghost/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install Ghost dependencies
        working-directory: Ghost
        run: pnpm install --frozen-lockfile --filter ghost...
      - run: pnpm install --frozen-lockfile
      - name: Start Ghost from source
        run: ./test-e2e/setup/start-ghost.sh
        env:
          GHOST_CORE_PATH: ${{ github.workspace }}/Ghost
          GHOST_LOG_FILE: ${{ runner.temp }}/ghost-boot.log
      - name: Bootstrap Ghost owner and integration
        run: node test-e2e/setup/bootstrap.js
      - run: pnpm test:e2e
      - name: Dump Ghost logs
        if: failure()
        run: cat "${{ runner.temp }}/ghost-boot.log"

  required-checks-pass:
    name: Required checks pass
    if: always()
    needs: [build, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
