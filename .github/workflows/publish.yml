# Releases the integration when `pnpm ship` (@tryghost/pro-ship) pushes a
# vX.Y.Z tag: pro-ship has already bumped package.json, committed, tagged
# and pushed with --follow-tags (via the ruleset's Ghost Foundation
# bypass), so this workflow waits for Test to pass on that commit, pushes
# the build to Zapier, promotes it (new connections start using it), and
# lands the CHANGELOG.md heading rename back on main via a tiny
# auto-merging PR.
#
# Step order is deliberate: everything that can reject the release (guards,
# finalize) runs first, then the Zapier side (push, promote), and the repo
# bookkeeping PR only after the release is actually live. Every step is
# idempotent or skippable, so a partly-failed run can be re-run from the
# Actions UI and converges instead of double-releasing (see
# docs/deployment.md for the failure modes).
#
# The staged user migration (`zapier-platform migrate`) is deliberately NOT
# automated - it stays human-owned.
name: Publish
on:
  push:
    tags:
      - v*
permissions: {}
concurrency:
  # never interleave two releases; don't cancel a release mid-promote
  group: zapier-publish
jobs:
  publish:
    name: Push and promote on Zapier
    runs-on: ubuntu-latest
    # generous: includes up to ~20 minutes waiting for Test on the tagged
    # commit (pro-ship pushes commit and tag together, so Test has usually
    # only just started when this run begins)
    timeout-minutes: 45
    environment: zapier
    permissions:
      contents: write # push the release bookkeeping branch
      pull-requests: write # open the bookkeeping PR + enable auto-merge
      actions: write # dispatch Test onto the bookkeeping branch
      checks: read # verify Test passed on the tagged commit
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          # full history so the tagged commit can be checked against main
          fetch-depth: 0
          persist-credentials: false
      - name: Derive the version from the tag
        id: version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          # x.y.z with each part 0-999 and no leading zeros - the promotable
          # subset of Zapier's version format. pro-ship happily creates
          # prerelease tags (v3.1.0-beta.1), but Zapier can never promote
          # labeled versions, so they are rejected here by design - test
          # unreleased work via the 0.0.0-preview snapshot instead
          if ! printf '%s' "$VERSION" | grep -Eq '^(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})\.(0|[1-9][0-9]{0,2})$'; then
              echo "::error::Tag '$TAG' does not name a promotable Zapier version - releases are plain vX.Y.Z (e.g. v3.0.0); prerelease tags cannot be promoted."
              exit 1
          fi
          # pro-ship writes the version into package.json before tagging;
          # a mismatch means the tag was not created by `pnpm ship`
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$VERSION" ]; then
              echo "::error::package.json at the tagged commit says '${PKG_VERSION}' but the tag names '${VERSION}' - release with \`pnpm ship\` (docs/deployment.md)."
              exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Require the tagged commit to be on main
        run: |
          if ! git merge-base --is-ancestor HEAD origin/main; then
              echo "::error::The release tag does not point at a commit on main. Only main releases are automated; 2.x maintenance releases stay manual (docs/deployment.md)."
              exit 1
          fi
      - name: Wait for a green Test run on the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # pro-ship pushes the version commit and the tag together
          # (--follow-tags), so the Test run for this commit normally starts
          # at the same time as this workflow - poll for it instead of
          # asserting instantly. Bounded at 40 x 30s = 20 minutes, which
          # comfortably covers the e2e job; fail loudly on a red Test or on
          # timeout (recovery: re-run this workflow run once Test is green).
          SHA="$(git rev-parse HEAD)"
          for attempt in $(seq 1 40); do
              # any(): a commit can carry several check runs with this name
              # (push, pull_request, and workflow_dispatch suites) in no
              # defined order - one green run is what the ruleset requires
              RUNS="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}/check-runs?check_name=Required%20checks%20pass" \
                  --jq '[.check_runs[] | {status, conclusion}]')"
              if jq -e 'any(.[]; .conclusion == "success")' <<<"$RUNS" >/dev/null; then
                  echo "Test is green on ${SHA} (attempt ${attempt})"
                  exit 0
              fi
              if jq -e 'length > 0 and all(.[]; .status == "completed")' <<<"$RUNS" >/dev/null; then
                  echo "::error::Test failed on the tagged commit (${SHA}) - fix main, then re-run this workflow run, or ship a new version."
                  exit 1
              fi
              echo "Waiting for Test on ${SHA} (attempt ${attempt}/40): $(jq -c . <<<"$RUNS")"
              sleep 30
          done
          echo "::error::Timed out after 20 minutes waiting for a 'Required checks pass' run on ${SHA} - once Test is green, re-run this workflow run (docs/deployment.md)."
          exit 1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          # no dependency cache here: restored caches are writable from the
          # default-branch scope, and a job holding ZAPIER_DEPLOY_KEY must not
          # execute artifacts it did not install itself (cache poisoning)
      - run: pnpm install --frozen-lockfile
      - name: Finalize CHANGELOG.md for the release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # renames '## Unreleased ...' to '## <version>' in the workspace so
          # promote always finds its changelog section; fails loudly when
          # there are no release notes, is a no-op when already finalized.
          # package.json needs no touch - pro-ship set it before tagging.
          node scripts/release-changelog.js finalize "$VERSION"
      - name: Check whether the version is already promoted
        # makes re-runs converge: a re-run after a successful promote must
        # not try to overwrite the (now immutable) promoted version
        id: zapier
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
          DISABLE_ZAPIER_ANALYTICS: 1
        run: |
          # `--format json` keys the rows by display header, and a promoted
          # version reports state 'promoted' - both verified against the
          # live integration with CLI 19.0.0
          STATE="$(pnpm exec zapier-platform versions --format json \
              | jq -r --arg v "$VERSION" '[.[] | select(.Version == $v) | .State] | first // "absent"')"
          echo "Version $VERSION is '$STATE' on Zapier"
          echo "state=$STATE" >> "$GITHUB_OUTPUT"
      - name: Push the version to Zapier
        if: steps.zapier.outputs.state != 'promoted'
        # see preview.yml for the --skip-dep-install rationale
        run: pnpm exec zapier-platform push --skip-dep-install
        env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
          DISABLE_ZAPIER_ANALYTICS: 1
      - name: Promote the version
        if: steps.zapier.outputs.state != 'promoted'
        # promote reads the '## <version>' section of CHANGELOG.md (just
        # finalized above) as the user-facing changelog and errors without it
        run: pnpm exec zapier-platform promote "$VERSION" --yes
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
          DISABLE_ZAPIER_ANALYTICS: 1
      - name: Land the changelog heading on main via an auto-merging PR
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ github.ref_name }}
        run: |
          # -xF: exact fixed-string line match, so the version's dots can't
          # act as regex wildcards (same reasoning as in the script itself)
          if git show origin/main:CHANGELOG.md | grep -qxF "## ${VERSION}"; then
              echo "main already carries the ${VERSION} changelog - nothing to land"
              exit 0
          fi
          BRANCH="release/v${VERSION}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          gh auth setup-git
          git switch -c "$BRANCH"
          # changelog only: pro-ship already committed the version bump
          git add CHANGELOG.md
          git commit -m "Finalize the ${VERSION} changelog

          The ${TAG} release was pushed and promoted on Zapier by the publish
          workflow; this records its changelog heading on main."
          # --force: the branch may linger from a previously failed run
          git push --force origin "$BRANCH"
          if [ -z "$(gh pr list --head "$BRANCH" --json number --jq '.[].number')" ]; then
              {
                  echo "Automated follow-up to the ${TAG} release: renames the CHANGELOG.md Unreleased heading to the released version. Zapier already serves this version; pro-ship already committed the version bump."
                  echo
                  echo '## Changelog'
                  echo
                  node scripts/release-changelog.js extract "$VERSION"
              } > /tmp/pr-body.md
              gh pr create --base main --head "$BRANCH" --title "Finalize the ${VERSION} changelog" --body-file /tmp/pr-body.md
          fi
          # PRs created with GITHUB_TOKEN don't trigger pull_request
          # workflows, so dispatch Test explicitly to satisfy the
          # 'Required checks pass' rule, then let auto-merge land it.
          # The same property applies to the eventual auto-merge push to
          # main: it triggers no workflows, which is what makes a
          # publish -> Test -> preview trigger loop impossible - but it
          # also means the bookkeeping commit itself gets no Test run
          # (see docs/deployment.md for the follow-on release caveat)
          gh workflow run test.yml --ref "$BRANCH"
          if [ "$(gh pr view "$BRANCH" --json autoMergeRequest --jq '.autoMergeRequest != null')" = 'true' ]; then
              echo "auto-merge already enabled on the ${BRANCH} PR"
          else
              gh pr merge --auto --rebase "$BRANCH"
          fi
      - name: Write the run summary
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          {
              echo "## Zapier release ${VERSION}"
              echo
              echo "- Pushed and promoted: new connections now use ${VERSION}."
              echo "- Existing users stay on their current version until migrated."
              echo
              echo '### Remaining manual step: staged migration'
              echo
              echo '```sh'
              echo "zapier-platform migrate <oldVersion> ${VERSION} 10   # then 50, 100"
              echo 'zapier-platform history'
              echo '```'
              echo
              echo "Watch Zapier's error dashboard between steps - see docs/deployment.md."
          } >> "$GITHUB_STEP_SUMMARY"
