# Pushes a private preview build to Zapier after every green Test run on
# main, so the developer account always has the current state of main
# available in the real Zap editor.
#
# The preview lives at the fixed snapshot version `0.0.0-preview` (created
# by `push --snapshot preview`). Snapshot/labeled versions can never be
# promoted on Zapier, so this version can never collide with a released
# version and stays overwritable forever - every push simply replaces it.
name: Preview
on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main]
permissions: {}
concurrency:
  # a newer merge to main supersedes any in-flight preview push
  group: zapier-preview
  cancel-in-progress: true
jobs:
  push:
    name: Push 0.0.0-preview to Zapier
    # workflow_run fires on failed runs too - only ship green commits
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: zapier
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # build exactly the commit that Test validated
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Push the snapshot version
        # --skip-dep-install builds from the frozen-lockfile install above
        # instead of a fresh, unpinned `pnpm install --production` in a temp
        # directory; the build's smart file inclusion only bundles files
        # reachable from index.js, so devDependencies stay out either way
        run: pnpm exec zapier-platform push --snapshot preview --skip-dep-install
        env:
          ZAPIER_DEPLOY_KEY: ${{ secrets.ZAPIER_DEPLOY_KEY }}
          DISABLE_ZAPIER_ANALYTICS: 1
      - name: Write the run summary
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          {
              echo "## Zapier preview updated"
              echo
              echo "- Integration version: \`0.0.0-preview\` (private)"
              echo "- Built from: \`${HEAD_SHA}\`"
              echo
              echo "Pick version 0.0.0-preview in the Zap editor (developer account) to test it."
          } >> "$GITHUB_STEP_SUMMARY"
